name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      run_acceptance:
        description: "Run acceptance tests"
        type: boolean
        default: false
      run_openshift_acceptance:
        description: "Run OpenShift acceptance tests"
        type: boolean
        default: false
      ocp_storage_class:
        description: "OpenShift storage class override"
        type: string
        required: false

permissions:
  contents: read

env:
  RENDERED_TEMPLATES_RETENTION_DAYS: 1
  SECURITY_RESULTS_RETENTION_DAYS: 7
  TEST_IMAGE_TAG: 0.21-ent
  TEST_CPU_LIMIT: 500m
  TEST_MEMORY_LIMIT: 2Gi

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Helm
        run: make setup-helm

      - name: Setup Kubeconform
        run: make setup-kubeconform

      - name: Run Helm Lint & Kubernetes Validation
        run: make lint-helm-k8s

      - name: Upload rendered templates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rendered-templates
          path: rendered.yaml
          retention-days: ${{ env.RENDERED_TEMPLATES_RETENTION_DAYS }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download rendered templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rendered-templates

      - name: Setup Trivy
        run: make setup-trivy

      - name: Run Trivy Security Scan
        run: make trivy-scan

      - name: Setup Kubescape
        run: make setup-kubescape

      - name: Run Kubescape Security Scan
        run: make kubescape-scan

      - name: Upload Kubescape results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kubescape-results
          path: kubescape-output.json
          retention-days: ${{ env.SECURITY_RESULTS_RETENTION_DAYS }}

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Print test job info
        run: |
          echo "================================"
          echo "Running Unit Tests"
          echo "================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "================================"

      - name: Setup Helm
        run: make setup-helm

      - name: Setup helm-unittest plugin
        run: make setup-helm-unittest

      - name: Run Unit Tests
        run: make unit-test

      - name: Helm Template (Dry Run)
        run: |
          echo "Running Helm template to validate chart rendering..."
          helm template boundary-worker . --debug
          echo ""
          echo "Helm template validation passed!"

      - name: Test with different values
        run: |
          echo "Testing chart with custom values..."
          helm template boundary-worker . \
            --set image.tag=$TEST_IMAGE_TAG \
            --set worker.resources.limits.cpu=$TEST_CPU_LIMIT \
            --set worker.resources.limits.memory=$TEST_MEMORY_LIMIT
          echo ""
          echo "Custom values test passed!"

      - name: Test Summary
        run: |
          echo "================================"
          echo "✅ All tests completed successfully!"
          echo "================================"

  acceptance-test:
    name: Acceptance Test
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_acceptance == 'true'
    env:
      BOUNDARY_ADDR: ${{ secrets.BOUNDARY_ADDR }}
      BOUNDARY_AUTH_METHOD_ID: ${{ secrets.BOUNDARY_AUTH_METHOD_ID }}
      BOUNDARY_CLUSTER_ID: ${{ secrets.BOUNDARY_CLUSTER_ID }}
      BOUNDARY_LOGIN_NAME: ${{ secrets.BOUNDARY_LOGIN_NAME }}
      BOUNDARY_PASSWORD: ${{ secrets.BOUNDARY_PASSWORD }}
      BOUNDARY_TARGET_ID: ${{ secrets.BOUNDARY_TARGET_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup acceptance environment
        run: make acceptance-setup

      - name: Generate worker config
        run: make worker-config

      - name: Install Helm chart and run Helm tests
        run: make acceptance-helm

      - name: Run acceptance tests
        run: make acceptance-test

      - name: Cleanup
        if: always()
        run: make acceptance-cleanup

  openshift-acceptance-test:
    name: OpenShift Acceptance Test
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_openshift_acceptance == 'true'
    env:
      BOUNDARY_ADDR: ${{ secrets.BOUNDARY_ADDR }}
      BOUNDARY_AUTH_METHOD_ID: ${{ secrets.BOUNDARY_AUTH_METHOD_ID }}
      BOUNDARY_CLUSTER_ID: ${{ secrets.BOUNDARY_CLUSTER_ID }}
      BOUNDARY_LOGIN_NAME: ${{ secrets.BOUNDARY_LOGIN_NAME }}
      BOUNDARY_PASSWORD: ${{ secrets.BOUNDARY_PASSWORD }}
      BOUNDARY_TARGET_ID: ${{ secrets.BOUNDARY_TARGET_ID }}
      OCP_STORAGE_CLASS: ${{ github.event.inputs.ocp_storage_class }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install oc CLI
        run: |
          curl -Lo /tmp/oc.tar.gz https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
          sudo tar -xzf /tmp/oc.tar.gz -C /usr/local/bin oc
          oc version --client

      - name: Setup Helm
        run: make setup-helm

      - name: Install Boundary CLI
        run: |
          wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install -y boundary
          boundary version

      - name: Login to OpenShift cluster
        run: |
          oc login "${{ secrets.OCP_SERVER }}" \
            --token="${{ secrets.OCP_TOKEN }}" \
            --insecure-skip-tls-verify=true

      - name: Run OpenShift acceptance tests
        run: make openshift-acceptance-full

      - name: Cleanup
        if: always()
        run: make openshift-acceptance-cleanup

