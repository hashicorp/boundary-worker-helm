name: Release Pipeline

on:
  push:
    branches: [yash/actions]

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint-job.yml

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/unit-test-job.yml

  integration-test:
    name: Integration Test
    needs: test
    uses: ./.github/workflows/integration-test-job.yml

  acceptance-test:
    name: Acceptance Test
    needs: integration-test
    uses: ./.github/workflows/acceptance-test-job.yml

  release:
    name: Release
    needs: acceptance-test
    uses: ./.github/workflows/release-job.yml
