name: Test Chart

on:
  workflow_call:

jobs:
  test:
    name: Test Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print test job info
        run: |
          echo "================================"
          echo "Running Test Job"
          echo "================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "================================"

      - name: Set up Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Helm Template (Dry Run)
        run: |
          echo "Running Helm template to validate chart rendering..."
          helm template boundary-worker . --debug
          echo ""
          echo "Helm template validation passed!"

      - name: Test with different values
        run: |
          echo "Testing chart with custom values..."
          helm template boundary-worker . \
            --set image.tag=0.22-ent \
            --set worker.resources.limits.cpu=500m \
            --set worker.resources.limits.memory=2Gi
          echo ""
          echo "Custom values test passed!"

      - name: Test Summary
        run: |
          echo "================================"
          echo "Test job completed successfully!"
          echo "================================"
