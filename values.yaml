# Default values for Boundary Worker Helm Chart

# Boundary image configuration
image:
  repository: hashicorp/boundary-enterprise
  tag: "0.21-ent"
  pullPolicy: IfNotPresent

# Worker configuration
worker:
  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9202"
      purpose = "proxy"
    }

    listener "tcp" {
      address     = "0.0.0.0:9203"
      purpose     = "ops"
      tls_disable = true
    }

    worker {
      auth_storage_path = "/var/lib/boundary"
      recording_storage_path = "/boundary/recording"
      tags {
        type = ["worker", "egress", "tests"]
      }

      controller_generated_activation_token = "<activation-token>"
    }

    hcp_boundary_cluster_id = "84bac8e2-5385-4b91-a056-1f45913dce6b"

    events {
      audit_enabled       = true
      sysevents_enabled   = true
      observations_enable = true
      sink "stderr" {
        name = "all-events"
        description = "All events sent to stderr"
        event_types = ["*"]
        format = "cloudevents-json"
      }
    }
  terminationGracePeriodSeconds: 7200
  service:
    proxy:
      enabled: true
      type: LoadBalancer
      port: 9202
      targetPort: 9202
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
        service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    ops:
      enabled: true
      type: ClusterIP
      port: 9203
      targetPort: 9203
      annotations: {}
  resources:
    limits:
      cpu: 200m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  persistence:
    recording:
      enabled: true
      size: "10Gi"
      accessMode: ReadWriteOnce
      storageClass: "gp3"
      path: "/boundary/recording"
    authStorage:
      enabled: true
      size: "1Gi"
      accessMode: ReadWriteOnce
      storageClass: "gp3"
      path: "/var/lib/boundary"

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Optional configurations
imagePullSecrets: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
