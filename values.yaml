# Default values for Boundary Worker Helm Chart

# Boundary image configuration
image:
  repository: hashicorp/boundary-enterprise
  tag: ""  # Defaults to Chart.appVersion (eg 0.21-ent) when empty
  pullPolicy: IfNotPresent

# Worker configuration
worker:
  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9202"
      purpose = "proxy"
    }

    listener "tcp" {
      address     = "0.0.0.0:9203"
      purpose     = "ops"
      tls_disable = true
    }

    worker {
      name = "boundary-worker" # Optional: must be set for kms registration.
      initial_upstreams = [] # Optional: set when the controller is self-managed.
      public_addr = "" # Optional: Set the worker's public address to make it reachable by clients.
      auth_storage_path = "/var/lib/boundary" # Optional: set when using token based worker registration.
      recording_storage_path = "/boundary/recording" # Optional: set when using session recording.
      tags {
        type = ["worker", "egress"]
      }


      controller_generated_activation_token = "controller-led-activation-token-here" # Optional: set when using controller-led worker registration. Requires setting the token value via Kubernetes Secret and referencing it with worker.extraEnv or worker.secretRefs. If not set, the worker will attempt to register without a token, which only works if the Boundary Controller is configured to allow tokenless registration.
      # Token can be provided in three ways:
      #   1. Plaintext:   set the value directly above (e.g. "act_1234abcd...")
      #   2. Kubernetes Secret (secretRefs): set the value above to "env://BOUNDARY_WORKER_CONTROLLER_GENERATED_ACTIVATION_TOKEN"
      #                   and set secretRefs.secretName pointing to a Secret that contains the token key.
      #   3. extraEnv:    set the value above to "env://BOUNDARY_WORKER_CONTROLLER_GENERATED_ACTIVATION_TOKEN"
      #                   and supply the token via extraEnv:
      #                     - name: BOUNDARY_WORKER_CONTROLLER_GENERATED_ACTIVATION_TOKEN
      #                       value: "act_1234abcd..."
    }

    # hcp_boundary_cluster_id = "your-cluster-id-here" # Optional: set when registering with HCP Boundary.

    events {
      audit_enabled        = true
      sysevents_enabled    = true
      observations_enabled = true
      sink "stderr" {
        name = "all-events"
        description = "All events sent to stderr"
        event_types = ["*"]
        format = "cloudevents-json"
      }
    }
  # Liveness probe configuration
  livenessProbe:
    scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Readiness probe configuration
  readinessProbe:
    scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Termination grace period: 2 hours (7200 seconds)
  # This long grace period allows active Boundary sessions to complete naturally before pod termination.
  # Adjust based on your maximum expected session duration. Sessions longer than this will be forcibly terminated.
  terminationGracePeriodSeconds: 7200
  service:
    proxy:
      enabled: true
      # ⚠️ SECURITY WARNING: LoadBalancer type creates a public endpoint in most cloud environments.
      # This exposes the worker proxy to the internet. For production, consider:
      # - Using ClusterIP with an Ingress controller
      # - Setting scheme to "internal" in annotations
      # - Implementing network policies
      type: LoadBalancer
      port: 9202
      targetPort: 9202
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
        service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    ops:
      enabled: true
      type: ClusterIP
      port: 9203
      targetPort: 9203
      annotations: {}
  resources:
    limits:
      cpu: 200m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  persistence:
    recording:
      enabled: true
      size: "10Gi"
      accessMode: ReadWriteOnce
      storageClass: ""  # Uses cluster default StorageClass; set to e.g. "gp3" for AWS
      path: "/boundary/recording"
    authStorage:
      enabled: true
      size: "1Gi"
      accessMode: ReadWriteOnce
      storageClass: ""  # Uses cluster default StorageClass; set to e.g. "gp3" for AWS
      path: "/var/lib/boundary"

# Namespace to deploy resources into, keep empty to use the namespace provided via --namespace flag during helm install/upgrade
namespace: ""

# Secret References
# Sensitive values consumed by the worker pod via valueFrom.secretKeyRef.
# The activation token key is only required when worker.config uses
# env://BOUNDARY_WORKER_CONTROLLER_GENERATED_ACTIVATION_TOKEN.
secretRefs:
  secretName: ""
  validateExisting: false
  keys:
    controllerGeneratedActivationToken: "worker-controller-generated-activation-token"

# Extra environment variables to inject into the worker container.
# Supports any valid Kubernetes env entry (name/value or name/valueFrom).
# Example:
#   extraEnv:
#     - name: BOUNDARY_WORKER_CONTROLLER_GENERATED_ACTIVATION_TOKEN
#       value: "my-token"
extraEnv: []

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# ServiceAccount configuration
# Annotate with IRSA (eks.amazonaws.com/role-arn) or Workload Identity to grant
# the worker pod cloud-provider permissions (e.g. AWS KMS) without Kubernetes Secrets.
serviceAccount:
  create: false
  name: ""  # Defaults to the chart fullname when empty
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/boundary-worker-role
  # iam.gke.io/gcp-service-account: boundary-worker@PROJECT.iam.gserviceaccount.com
  automountServiceAccountToken: false  # Set to true when using IRSA or Workload Identity

# Optional configurations
imagePullSecrets: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
