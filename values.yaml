# Default values for Boundary Worker Helm Chart

# Boundary image configuration
image:
  repository: hashicorp/boundary-enterprise
  tag: ""  # Defaults to Chart.appVersion (eg 0.21-ent) when empty
  pullPolicy: IfNotPresent

# Worker configuration
worker:
  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9202"
      purpose = "proxy"
    }

    listener "tcp" {
      address     = "0.0.0.0:9203"
      purpose     = "ops"
      tls_disable = true
    }

    worker {
      auth_storage_path = "/var/lib/boundary"
      recording_storage_path = "/boundary/recording"
      tags {
        type = ["worker", "egress"]
      }

      # ⚠️ REQUIRED: You MUST set ONE of the following registration methods:
      # Option 1: Controller-generated activation token (recommended for HCP Boundary)
      # controller_generated_activation_token = "your-activation-token-here"
      
      # Option 2: Worker-led registration (requires manual authorization on controller)
      # Leave activation token unset and use worker auth information from logs
    }

    # ⚠️ REQUIRED: You MUST set ONE of the following connection methods:
    # Option 1: HCP Boundary cluster ID
    # hcp_boundary_cluster_id = "your-cluster-id-here"
    
    # Option 2: Self-managed Boundary with initial upstreams
    # initial_upstreams = ["boundary-controller.boundary.svc.cluster.local:9201"]

    events {
      audit_enabled        = true
      sysevents_enabled    = true
      observations_enabled = true
      sink "stderr" {
        name = "all-events"
        description = "All events sent to stderr"
        event_types = ["*"]
        format = "cloudevents-json"
      }
    }
  # Liveness probe configuration
  livenessProbe:
    scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Readiness probe configuration
  readinessProbe:
    scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Termination grace period: 2 hours (7200 seconds)
  # This long grace period allows active Boundary sessions to complete naturally before pod termination.
  # Adjust based on your maximum expected session duration. Sessions longer than this will be forcibly terminated.
  terminationGracePeriodSeconds: 7200
  service:
    proxy:
      enabled: true
      # ⚠️ SECURITY WARNING: LoadBalancer type creates a public endpoint in most cloud environments.
      # This exposes the worker proxy to the internet. For production, consider:
      # - Using ClusterIP with an Ingress controller
      # - Setting scheme to "internal" in annotations
      # - Implementing network policies
      type: LoadBalancer
      port: 9202
      targetPort: 9202
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
        service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    ops:
      enabled: true
      type: ClusterIP
      port: 9203
      targetPort: 9203
      annotations: {}
  resources:
    limits:
      cpu: 200m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  persistence:
    recording:
      enabled: true
      size: "10Gi"
      accessMode: ReadWriteOnce
      storageClass: ""  # Uses cluster default StorageClass; set to e.g. "gp3" for AWS
      path: "/boundary/recording"
    authStorage:
      enabled: true
      size: "1Gi"
      accessMode: ReadWriteOnce
      storageClass: ""  # Uses cluster default StorageClass; set to e.g. "gp3" for AWS
      path: "/var/lib/boundary"

# Namespace to deploy resources into, keep empty to use the namespace provided via --namespace flag during helm install/upgrade
namespace: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# ServiceAccount configuration
# Annotate with IRSA (eks.amazonaws.com/role-arn) or Workload Identity to grant
# the worker pod cloud-provider permissions (e.g. AWS KMS) without Kubernetes Secrets.
serviceAccount:
  create: false
  name: ""  # Defaults to the chart fullname when empty
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/boundary-worker-role
  # iam.gke.io/gcp-service-account: boundary-worker@PROJECT.iam.gserviceaccount.com
  automountServiceAccountToken: false  # Set to true when using IRSA or Workload Identity

# Optional configurations
imagePullSecrets: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
