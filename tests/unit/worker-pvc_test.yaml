# Copyright IBM Corp. 2026

suite: Test Worker PVC Configuration
templates:
  - worker-pvc.yaml
tests:
  # ============================================================================
  # RECORDING PVC TESTS
  # ============================================================================

  - it: should configure recording PVC with all options
    release:
      name: test-release
      namespace: test-namespace
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.size: 100Gi
      worker.persistence.recording.storageClass: fast-ssd
      worker.persistence.recording.accessMode: ReadWriteOnce
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-release-recording-storage
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: metadata.labels["storage-type"]
          value: recording
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: worker
      - equal:
          path: spec.resources.requests.storage
          value: 100Gi
      - equal:
          path: spec.storageClassName
          value: fast-ssd
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce

  - it: should not create recording PVC when disabled
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.labels["storage-type"]
          value: auth
        documentIndex: 0

  # ============================================================================
  # AUTH STORAGE PVC TESTS
  # ============================================================================

  - it: should configure auth storage PVC with all options
    release:
      name: test-release
      namespace: test-namespace
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.size: 10Gi
      worker.persistence.authStorage.storageClass: standard-ssd
      worker.persistence.authStorage.accessMode: ReadWriteOnce
    documentIndex: 1
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-release-auth-storage
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: metadata.labels["storage-type"]
          value: auth
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: worker
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi
      - equal:
          path: spec.storageClassName
          value: standard-ssd
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce

  - it: should create auth PVC when enabled
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 0
      - equal:
          path: metadata.labels["storage-type"]
          value: auth
        documentIndex: 0

  - it: should not create auth PVC when disabled
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create any PVC when both disabled
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should only create recording PVC when auth storage disabled
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.authStorage.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
        documentIndex: 0
      - equal:
          path: metadata.labels["storage-type"]
          value: recording
        documentIndex: 0

  # ============================================================================
  # CONDITIONAL RENDERING TESTS
  # ============================================================================

  - it: should create both PVCs when recording enabled
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.authStorage.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.labels["storage-type"]
          value: recording
        documentIndex: 0
      - equal:
          path: metadata.labels["storage-type"]
          value: auth
        documentIndex: 1

  - it: should handle namespace override for both PVCs
    release:
      namespace: custom-namespace
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.authStorage.enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: custom-namespace
        documentIndex: 1

  # ============================================================================
  # COMPLETE CONFIGURATION TEST
  # ============================================================================

  - it: should render minimal auth PVC configuration
    release:
      name: minimal-worker
      namespace: test-ns
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.size: 2Gi
      worker.persistence.authStorage.storageClass: local-path
      worker.persistence.authStorage.accessMode: ReadWriteOnce
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: minimal-worker-auth-storage
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: test-ns
        documentIndex: 0
      - equal:
          path: spec.resources.requests.storage
          value: 2Gi
        documentIndex: 0
      - equal:
          path: spec.storageClassName
          value: local-path
        documentIndex: 0

  # ============================================================================
  # STORAGECLASS CONDITIONAL TESTS
  # ============================================================================

  - it: should omit storageClassName for recording PVC when storageClass is empty
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.authStorage.enabled: false
      worker.persistence.recording.storageClass: ""
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: spec.storageClassName
        documentIndex: 0

  - it: should omit storageClassName for auth PVC when storageClass is empty
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.storageClass: ""
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: spec.storageClassName
        documentIndex: 0

  # ============================================================================
  # RETENTION POLICY TESTS
  # ============================================================================

  - it: should add helm.sh/resource-policy keep annotation to recording PVC by default
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.authStorage.enabled: false
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
        documentIndex: 0

  - it: should add helm.sh/resource-policy keep annotation to auth PVC by default
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
        documentIndex: 0

  - it: should add retention annotation to both PVCs when retainOnUninstall is true
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.retainOnUninstall: true
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.retainOnUninstall: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
        documentIndex: 0
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
        documentIndex: 1

  - it: should omit retention annotation on recording PVC when retainOnUninstall is false
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.retainOnUninstall: false
      worker.persistence.authStorage.enabled: false
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/resource-policy"]
        documentIndex: 0

  - it: should omit retention annotation on auth PVC when retainOnUninstall is false
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.retainOnUninstall: false
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/resource-policy"]
        documentIndex: 0

  - it: should support mixed retention settings across PVCs
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.retainOnUninstall: true
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.retainOnUninstall: false
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
        documentIndex: 0
      - notExists:
          path: metadata.annotations["helm.sh/resource-policy"]
        documentIndex: 1
