suite: Test All Configuration Options
templates:
  - worker-deployment.yaml
  - worker-service.yaml
  - worker-configmap.yaml
  - worker-pvc.yaml
tests:
  # ============================================================================
  # IMAGE CONFIGURATION TESTS
  # ============================================================================
  
  - it: should use custom image repository
    template: worker-deployment.yaml
    set:
      image.repository: custom/boundary
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^custom/boundary:"

  - it: should use custom image tag
    template: worker-deployment.yaml
    set:
      image.tag: "1.0.0"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ":1\\.0\\.0$"

  - it: should use custom image pull policy
    template: worker-deployment.yaml
    set:
      image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should include imagePullSecrets when specified
    template: worker-deployment.yaml
    set:
      imagePullSecrets:
        - name: my-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-secret

  - it: should support multiple imagePullSecrets
    template: worker-deployment.yaml
    set:
      imagePullSecrets:
        - name: secret-one
        - name: secret-two
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: secret-one
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: secret-two

  # ============================================================================
  # WORKER CONFIGURATION TESTS
  # ============================================================================
  
  - it: should set custom terminationGracePeriodSeconds
    template: worker-deployment.yaml
    set:
      worker.terminationGracePeriodSeconds: 3600
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 3600

  - it: should use default terminationGracePeriodSeconds when not set
    template: worker-deployment.yaml
    set:
      worker.terminationGracePeriodSeconds: null
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 7200

  - it: should include worker config in configmap
    template: worker-configmap.yaml
    set:
      worker.config: |
        listener "tcp" {
          address = "0.0.0.0:9202"
        }
    asserts:
      - isNotEmpty:
          path: data["boundary-worker.hcl"]
      - matchRegex:
          path: data["boundary-worker.hcl"]
          pattern: "listener \"tcp\""

  - it: should handle empty worker config
    template: worker-configmap.yaml
    set:
      worker.config: ""
    asserts:
      - isNotNull:
          path: data["boundary-worker.hcl"]

  # ============================================================================
  # RESOURCE CONFIGURATION TESTS
  # ============================================================================
  
  - it: should set custom CPU limits
    template: worker-deployment.yaml
    set:
      worker.resources.limits.cpu: 500m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 500m

  - it: should set custom memory limits
    template: worker-deployment.yaml
    set:
      worker.resources.limits.memory: 2Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi

  - it: should set custom CPU requests
    template: worker-deployment.yaml
    set:
      worker.resources.requests.cpu: 200m
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 200m

  - it: should set custom memory requests
    template: worker-deployment.yaml
    set:
      worker.resources.requests.memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi

  - it: should set all resource limits and requests
    template: worker-deployment.yaml
    set:
      worker.resources.limits.cpu: 1000m
      worker.resources.limits.memory: 4Gi
      worker.resources.requests.cpu: 500m
      worker.resources.requests.memory: 2Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 2Gi

  # ============================================================================
  # SERVICE CONFIGURATION TESTS - PROXY
  # ============================================================================
  
  - it: should set custom proxy service type
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: true
      worker.service.proxy.type: NodePort
    documentIndex: 0
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should set custom proxy service port
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: true
      worker.service.proxy.port: 8080
    documentIndex: 0
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should set custom proxy service targetPort
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: true
      worker.service.proxy.targetPort: 8080
    documentIndex: 0
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: 8080

  - it: should include proxy service annotations
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: true
      worker.service.proxy.annotations:
        custom.annotation: "value"
        another.annotation: "test"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["custom.annotation"]
          value: "value"
      - equal:
          path: metadata.annotations["another.annotation"]
          value: "test"

  - it: should not create proxy service when disabled
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: false
      worker.service.ops.enabled: true
    asserts:
      - hasDocuments:
          count: 1

  - it: should have correct proxy service selector labels
    template: worker-service.yaml
    release:
      name: test-release
    set:
      worker.service.proxy.enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: boundary-worker
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: worker

  # ============================================================================
  # SERVICE CONFIGURATION TESTS - OPS
  # ============================================================================
  
  - it: should set custom ops service type
    template: worker-service.yaml
    set:
      worker.service.ops.enabled: true
      worker.service.ops.type: NodePort
    documentIndex: 1
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should set custom ops service port
    template: worker-service.yaml
    set:
      worker.service.ops.enabled: true
      worker.service.ops.port: 8081
    documentIndex: 1
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8081

  - it: should set custom ops service targetPort
    template: worker-service.yaml
    set:
      worker.service.ops.enabled: true
      worker.service.ops.targetPort: 8081
    documentIndex: 1
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: 8081

  - it: should include ops service annotations
    template: worker-service.yaml
    set:
      worker.service.ops.enabled: true
      worker.service.ops.annotations:
        custom.annotation: "ops-value"
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.annotations["custom.annotation"]
          value: "ops-value"

  - it: should not create ops service when disabled
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: true
      worker.service.ops.enabled: false
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Service
        documentIndex: 0
      - isNull:
          path: kind
        documentIndex: 1

  - it: should have correct ops service selector labels
    template: worker-service.yaml
    release:
      name: test-release
    set:
      worker.service.ops.enabled: true
    documentIndex: 1
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: boundary-worker
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: worker

  # ============================================================================
  # PERSISTENCE CONFIGURATION TESTS - RECORDING
  # ============================================================================
  
  - it: should set custom recording storage size
    template: worker-pvc.yaml
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.size: 20Gi
    documentIndex: 0
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 20Gi

  - it: should set custom recording storage class
    template: worker-pvc.yaml
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.storageClass: fast-ssd
    documentIndex: 0
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd

  - it: should set custom recording access mode
    template: worker-pvc.yaml
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.accessMode: ReadWriteMany
    documentIndex: 0
    asserts:
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany

  - it: should mount recording volume at custom path
    template: worker-deployment.yaml
    set:
      worker.persistence.recording.enabled: true
      worker.persistence.recording.path: /custom/recording
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[3].mountPath
          value: /custom/recording

  - it: should not create recording PVC when disabled
    template: worker-pvc.yaml
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not mount recording volume when persistence disabled
    template: worker-deployment.yaml
    set:
      worker.persistence.recording.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts[3]

  - it: should have storage-type label on recording PVC
    template: worker-pvc.yaml
    set:
      worker.persistence.recording.enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.labels["storage-type"]
          value: recording

  # ============================================================================
  # PERSISTENCE CONFIGURATION TESTS - AUTH STORAGE
  # ============================================================================
  
  - it: should set custom auth storage size
    template: worker-pvc.yaml
    set:
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.size: 5Gi
    documentIndex: 1
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi

  - it: should set custom auth storage class
    template: worker-pvc.yaml
    set:
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.storageClass: standard
    documentIndex: 1
    asserts:
      - equal:
          path: spec.storageClassName
          value: standard

  - it: should set custom auth storage access mode
    template: worker-pvc.yaml
    set:
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.accessMode: ReadWriteOnce
    documentIndex: 1
    asserts:
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce

  - it: should mount auth storage at custom path
    template: worker-deployment.yaml
    set:
      worker.persistence.authStorage.enabled: true
      worker.persistence.authStorage.path: /custom/auth
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].mountPath
          value: /custom/auth

  - it: should use emptyDir for auth storage when persistence disabled
    template: worker-deployment.yaml
    set:
      worker.persistence.authStorage.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[2].emptyDir
          value: {}

  - it: should have storage-type label on auth PVC
    template: worker-pvc.yaml
    set:
      worker.persistence.authStorage.enabled: true
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.labels["storage-type"]
          value: auth

  # ============================================================================
  # SECURITY CONTEXT TESTS - POD LEVEL
  # ============================================================================
  
  - it: should set custom pod runAsUser
    template: worker-deployment.yaml
    set:
      podSecurityContext.runAsUser: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1001

  - it: should set custom pod runAsGroup
    template: worker-deployment.yaml
    set:
      podSecurityContext.runAsGroup: 2000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 2000

  - it: should set custom pod fsGroup
    template: worker-deployment.yaml
    set:
      podSecurityContext.fsGroup: 3000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 3000

  - it: should set pod runAsNonRoot
    template: worker-deployment.yaml
    set:
      podSecurityContext.runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: should set pod fsGroupChangePolicy
    template: worker-deployment.yaml
    set:
      podSecurityContext.fsGroupChangePolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: Always

  - it: should set pod seccomp profile
    template: worker-deployment.yaml
    set:
      podSecurityContext.seccompProfile.type: RuntimeDefault
    asserts:
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should apply all pod security context settings
    template: worker-deployment.yaml
    set:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 2000
        fsGroup: 3000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1001
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 2000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 3000
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  # ============================================================================
  # SECURITY CONTEXT TESTS - CONTAINER LEVEL
  # ============================================================================
  
  - it: should set container runAsUser
    template: worker-deployment.yaml
    set:
      containerSecurityContext.runAsUser: 1001
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001

  - it: should set container runAsGroup
    template: worker-deployment.yaml
    set:
      containerSecurityContext.runAsGroup: 2000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 2000

  - it: should set container runAsNonRoot
    template: worker-deployment.yaml
    set:
      containerSecurityContext.runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should set container allowPrivilegeEscalation
    template: worker-deployment.yaml
    set:
      containerSecurityContext.allowPrivilegeEscalation: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should set container readOnlyRootFilesystem
    template: worker-deployment.yaml
    set:
      containerSecurityContext.readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should drop all capabilities
    template: worker-deployment.yaml
    set:
      containerSecurityContext.capabilities.drop:
        - ALL
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL

  - it: should set container seccomp profile
    template: worker-deployment.yaml
    set:
      containerSecurityContext.seccompProfile.type: RuntimeDefault
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: should apply all container security context settings
    template: worker-deployment.yaml
    set:
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 2000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 2000
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: RuntimeDefault

  # ============================================================================
  # POD ANNOTATIONS TESTS
  # ============================================================================
  
  - it: should include custom pod annotations
    template: worker-deployment.yaml
    set:
      podAnnotations:
        custom.annotation: "test-value"
        another.annotation: "another-value"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom.annotation"]
          value: "test-value"
      - equal:
          path: spec.template.metadata.annotations["another.annotation"]
          value: "another-value"

  - it: should include checksum annotations
    template: worker-deployment.yaml
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/config"]
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/values"]

  - it: should merge custom annotations with checksum annotations
    template: worker-deployment.yaml
    set:
      podAnnotations:
        custom: "value"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["custom"]
          value: "value"
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/config"]
      - isNotEmpty:
          path: spec.template.metadata.annotations["checksum/values"]

  # ============================================================================
  # NODE SELECTOR TESTS
  # ============================================================================
  
  - it: should set single nodeSelector
    template: worker-deployment.yaml
    set:
      nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should set multiple nodeSelectors
    template: worker-deployment.yaml
    set:
      nodeSelector:
        disktype: ssd
        environment: production
        region: us-west
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
      - equal:
          path: spec.template.spec.nodeSelector.environment
          value: production
      - equal:
          path: spec.template.spec.nodeSelector.region
          value: us-west

  - it: should not have nodeSelector when not specified
    template: worker-deployment.yaml
    set:
      nodeSelector: {}
    asserts:
      - isNull:
          path: spec.template.spec.nodeSelector

  # ============================================================================
  # TOLERATIONS TESTS
  # ============================================================================
  
  - it: should set single toleration
    template: worker-deployment.yaml
    set:
      tolerations:
        - key: "key1"
          operator: "Equal"
          value: "value1"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: key1
      - equal:
          path: spec.template.spec.tolerations[0].operator
          value: Equal
      - equal:
          path: spec.template.spec.tolerations[0].value
          value: value1
      - equal:
          path: spec.template.spec.tolerations[0].effect
          value: NoSchedule

  - it: should set multiple tolerations
    template: worker-deployment.yaml
    set:
      tolerations:
        - key: "key1"
          operator: "Equal"
          value: "value1"
          effect: "NoSchedule"
        - key: "key2"
          operator: "Exists"
          effect: "NoExecute"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: key1
      - equal:
          path: spec.template.spec.tolerations[1].key
          value: key2
      - equal:
          path: spec.template.spec.tolerations[1].operator
          value: Exists

  - it: should not have tolerations when not specified
    template: worker-deployment.yaml
    set:
      tolerations: []
    asserts:
      - isNull:
          path: spec.template.spec.tolerations

  # ============================================================================
  # AFFINITY TESTS
  # ============================================================================
  
  - it: should set pod affinity
    template: worker-deployment.yaml
    set:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - boundary
              topologyKey: kubernetes.io/hostname
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity.podAffinity
      - equal:
          path: spec.template.spec.affinity.podAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].topologyKey
          value: kubernetes.io/hostname

  - it: should set node affinity
    template: worker-deployment.yaml
    set:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - worker
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity.nodeAffinity

  - it: should set pod anti-affinity
    template: worker-deployment.yaml
    set:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - boundary
                topologyKey: kubernetes.io/hostname
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity.podAntiAffinity

  - it: should not have affinity when not specified
    template: worker-deployment.yaml
    set:
      affinity: {}
    asserts:
      - isNull:
          path: spec.template.spec.affinity

  # ============================================================================
  # CONTAINER PORTS TESTS
  # ============================================================================
  
  - it: should have proxy port configured
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: proxy
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9202
      - equal:
          path: spec.template.spec.containers[0].ports[0].protocol
          value: TCP

  - it: should have ops port configured
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[1].name
          value: ops
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 9203
      - equal:
          path: spec.template.spec.containers[0].ports[1].protocol
          value: TCP

  # ============================================================================
  # PROBES TESTS
  # ============================================================================
  
  - it: should have liveness probe configured
    template: worker-deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: proxy
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 60
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 10

  - it: should have readiness probe configured
    template: worker-deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: proxy
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 60
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 10

  # ============================================================================
  # VOLUME MOUNTS TESTS
  # ============================================================================
  
  - it: should have config volume mount
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].name
          value: config
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/boundary
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].readOnly
          value: true

  - it: should have tmp volume mount
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: tmp
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].mountPath
          value: /tmp

  - it: should have auth storage volume mount
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[2].name
          value: auth-storage

  - it: should have recording storage volume mount when enabled
    template: worker-deployment.yaml
    set:
      worker.persistence.recording.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[3].name
          value: recording-storage

  # ============================================================================
  # VOLUMES TESTS
  # ============================================================================
  
  - it: should have config volume from configmap
    template: worker-deployment.yaml
    release:
      name: test-release
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: config
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: test-release-config

  - it: should have tmp emptyDir volume
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].name
          value: tmp
      - equal:
          path: spec.template.spec.volumes[1].emptyDir
          value: {}

  - it: should have auth storage PVC volume when enabled
    template: worker-deployment.yaml
    release:
      name: test-release
    set:
      worker.persistence.authStorage.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.volumes[2].name
          value: auth-storage
      - equal:
          path: spec.template.spec.volumes[2].persistentVolumeClaim.claimName
          value: test-release-auth-storage

  - it: should have recording storage PVC volume when enabled
    template: worker-deployment.yaml
    release:
      name: test-release
    set:
      worker.persistence.recording.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.volumes[3].name
          value: recording-storage
      - equal:
          path: spec.template.spec.volumes[3].persistentVolumeClaim.claimName
