  # ============================================================================
  # ENVIRONMENT VARIABLES TESTS
  # ============================================================================
  
  - it: should have POD_NAME environment variable
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: POD_NAME
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.fieldRef.fieldPath
          value: metadata.name

  - it: should have SKIP_SETCAP environment variable
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: SKIP_SETCAP
      - equal:
          path: spec.template.spec.containers[0].env[1].value
          value: "1"

  # ============================================================================
  # DEPLOYMENT SPEC TESTS
  # ============================================================================
  
  - it: should have single replica
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should disable automountServiceAccountToken
    template: worker-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should have correct selector match labels
    template: worker-deployment.yaml
    release:
      name: test-release
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: boundary-worker
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: worker

  # ============================================================================
  # EDGE CASES AND CONDITIONAL RENDERING
  # ============================================================================
  
  - it: should handle both services disabled
    template: worker-service.yaml
    set:
      worker.service.proxy.enabled: false
      worker.service.ops.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isNull:
          path: kind
        documentIndex: 0

  - it: should handle both PVCs disabled
    template: worker-pvc.yaml
    set:
      worker.persistence.recording.enabled: false
      worker.persistence.authStorage.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should handle namespace override
    template: worker-deployment.yaml
    release:
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should handle all services in custom namespace
    templates:
      - worker-deployment.yaml
      - worker-configmap.yaml
      - worker-service.yaml
    release:
      namespace: custom-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns

  # ============================================================================
  # COMPLETE CONFIGURATION TEST
  # ============================================================================
  
  - it: should render with all options configured
    template: worker-deployment.yaml
    set:
      image.repository: custom/boundary
      image.tag: "2.0.0"
      image.pullPolicy: Always
      imagePullSecrets:
        - name: registry-secret
      worker.terminationGracePeriodSeconds: 1800
      worker.resources.limits.cpu: 1000m
      worker.resources.limits.memory: 4Gi
      worker.resources.requests.cpu: 500m
      worker.resources.requests.memory: 2Gi
      podSecurityContext:
        runAsUser: 1001
        runAsGroup: 2000
        fsGroup: 3000
      containerSecurityContext:
        runAsUser: 1001
        allowPrivilegeEscalation: false
      podAnnotations:
        test: "value"
      nodeSelector:
        disktype: ssd
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "boundary"
          effect: "NoSchedule"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^custom/boundary:2\\.0\\.0$"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: registry-secret
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 1800
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1001
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 3000
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
