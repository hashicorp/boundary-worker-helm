      echo "=========================================="
      echo "Test: Ops Service Accessibility"
      echo "=========================================="
      
      SERVICE_NAME="boundary-worker-ops"
      NAMESPACE="default"
      EXPECTED_TYPE="ClusterIP"
      EXPECTED_PORT="9203"
      
      echo "Checking if ops service exists..."
      if ! kubectl get service "$SERVICE_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
        echo "❌ FAILED: Ops service $SERVICE_NAME does not exist"
