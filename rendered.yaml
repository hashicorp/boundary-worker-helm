      runAsUser: 65534
      runAsGroup: 65534
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -e
      echo "=========================================="
      echo "Test: Image Pull Policy"
      echo "=========================================="
      
      NAMESPACE="default"
      
      echo "Finding worker pod..."
      POD_NAME=$(kubectl get pods -n "$NAMESPACE" \
        -l app.kubernetes.io/component=worker,app.kubernetes.io/instance=boundary-worker \
        -o jsonpath='{.items[0].metadata.name}')
      
      if [ -z "$POD_NAME" ]; then
        echo "❌ FAILED: Worker pod not found"
        exit 1
      fi
      echo "✅ Worker pod found: $POD_NAME"
      
      echo ""
      echo "Checking image repository..."
      IMAGE=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.containers[0].image}')
      if [ -z "$IMAGE" ]; then
        echo "❌ FAILED: Image not found"
        exit 1
      fi
      echo "✅ Image is set: $IMAGE"
      
      # Extract repository and tag
      IMAGE_REPO=$(echo "$IMAGE" | cut -d: -f1)
      IMAGE_TAG=$(echo "$IMAGE" | cut -d: -f2)
      
      echo ""
      echo "Validating image repository..."
      EXPECTED_REPO="hashicorp/boundary-enterprise"
      if [ "$IMAGE_REPO" != "$EXPECTED_REPO" ]; then
        echo "⚠️  WARNING: Image repository ($IMAGE_REPO) differs from expected ($EXPECTED_REPO)"
      else
        echo "✅ Image repository matches configuration: $IMAGE_REPO"
      fi
      
      echo ""
      echo "Validating image tag..."
      EXPECTED_TAG="0.21-ent"
      
      if [ "$IMAGE_TAG" != "$EXPECTED_TAG" ]; then
        echo "⚠️  WARNING: Image tag ($IMAGE_TAG) differs from expected ($EXPECTED_TAG)"
      else
        echo "✅ Image tag matches configuration: $IMAGE_TAG"
      fi
      
      echo ""
      echo "Checking imagePullPolicy..."
      PULL_POLICY=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.containers[0].imagePullPolicy}')
      EXPECTED_POLICY="IfNotPresent"
      
      if [ "$PULL_POLICY" != "$EXPECTED_POLICY" ]; then
        echo "⚠️  WARNING: imagePullPolicy ($PULL_POLICY) differs from expected ($EXPECTED_POLICY)"
      else
        echo "✅ imagePullPolicy is correctly set: $PULL_POLICY"
      fi
      
      echo ""
      echo "Checking imagePullSecrets..."
      PULL_SECRETS=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.imagePullSecrets[*].name}')
      if [ -z "$PULL_SECRETS" ]; then
        echo "✅ No imagePullSecrets configured (as expected)"
      else
        echo "ℹ️  imagePullSecrets found but not configured in values: $PULL_SECRETS"
      fi
      
      echo ""
      echo "Checking container image status..."
      CONTAINER_READY=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.status.containerStatuses[0].ready}')
      IMAGE_PULL_STATUS=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.status.containerStatuses[0].state}')
      
      if [ "$CONTAINER_READY" = "true" ]; then
        echo "✅ Container is ready (image pulled successfully)"
      else
        echo "⚠️  WARNING: Container is not ready"
        echo "Container state: $IMAGE_PULL_STATUS"
      fi
      
      # Check for image pull errors
      IMAGE_PULL_ERRORS=$(kubectl get events -n "$NAMESPACE" --field-selector involvedObject.name="$POD_NAME" \
        | grep -i "Failed.*pull\|ErrImagePull\|ImagePullBackOff" || echo "")
      
      if [ -n "$IMAGE_PULL_ERRORS" ]; then
        echo "⚠️  WARNING: Image pull errors detected:"
        echo "$IMAGE_PULL_ERRORS"
      else
        echo "✅ No image pull errors detected"
      fi
      
      echo ""
