# Source: boundary-worker/templates/tests/test-annotations.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "boundary-worker-test-annotations"
  namespace: default
  labels:
    helm.sh/chart: boundary-worker-0.1.0
    app.kubernetes.io/name: boundary-worker
    app.kubernetes.io/instance: boundary-worker
    app.kubernetes.io/version: "0.20.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "boundary-worker-test"
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: test
    image: bitnami/kubectl:latest
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -e
      echo "=========================================="
      echo "Test: Annotations"
      echo "=========================================="
      
      NAMESPACE="default"
      
      echo "Finding worker pod..."
      POD_NAME=$(kubectl get pods -n "$NAMESPACE" \
        -l app.kubernetes.io/component=worker,app.kubernetes.io/instance=boundary-worker \
        -o jsonpath='{.items[0].metadata.name}')
      
      if [ -z "$POD_NAME" ]; then
        echo "❌ FAILED: Worker pod not found"
        exit 1
      fi
      echo "✅ Worker pod found: $POD_NAME"
      
      echo ""
      echo "Checking pod annotations include config checksums..."
      CONFIG_CHECKSUM=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.checksum/config}')
      
      if [ -n "$CONFIG_CHECKSUM" ]; then
        echo "✅ Config checksum annotation present: $CONFIG_CHECKSUM"
      else
        echo "⚠️  WARNING: Config checksum annotation not found"
      fi
      
      VALUES_CHECKSUM=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.checksum/values}')
      
      if [ -n "$VALUES_CHECKSUM" ]; then
        echo "✅ Values checksum annotation present: $VALUES_CHECKSUM"
      else
        echo "⚠️  WARNING: Values checksum annotation not found"
      fi
      
      echo ""
      echo "Checking service annotations..."
      PROXY_SERVICE="boundary-worker-proxy"
      
      echo "Proxy service annotations:"
      PROXY_ANNOTATIONS=$(kubectl get service "$PROXY_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}')
      
      if [ -n "$PROXY_ANNOTATIONS" ]; then
        echo "$PROXY_ANNOTATIONS"
        # Check for expected annotations from values
        ANNOTATION_VALUE=$(kubectl get service "$PROXY_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-backend-protocol}')
        if [ -n "$ANNOTATION_VALUE" ]; then
          echo "✅ Found annotation: service.beta.kubernetes.io/aws-load-balancer-backend-protocol"
        else
          echo "⚠️  WARNING: Expected annotation not found: service.beta.kubernetes.io/aws-load-balancer-backend-protocol"
        fi
        ANNOTATION_VALUE=$(kubectl get service "$PROXY_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-cross-zone-load-balancing-enabled}')
        if [ -n "$ANNOTATION_VALUE" ]; then
          echo "✅ Found annotation: service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled"
        else
          echo "⚠️  WARNING: Expected annotation not found: service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled"
        fi
        ANNOTATION_VALUE=$(kubectl get service "$PROXY_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-scheme}')
        if [ -n "$ANNOTATION_VALUE" ]; then
          echo "✅ Found annotation: service.beta.kubernetes.io/aws-load-balancer-scheme"
        else
          echo "⚠️  WARNING: Expected annotation not found: service.beta.kubernetes.io/aws-load-balancer-scheme"
        fi
        ANNOTATION_VALUE=$(kubectl get service "$PROXY_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-type}')
        if [ -n "$ANNOTATION_VALUE" ]; then
          echo "✅ Found annotation: service.beta.kubernetes.io/aws-load-balancer-type"
        else
          echo "⚠️  WARNING: Expected annotation not found: service.beta.kubernetes.io/aws-load-balancer-type"
        fi
      else
        echo "ℹ️  No annotations on proxy service"
      fi
      echo ""
      OPS_SERVICE="boundary-worker-ops"
      
      echo "Ops service annotations:"
      OPS_ANNOTATIONS=$(kubectl get service "$OPS_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}')
      
      if [ -n "$OPS_ANNOTATIONS" ]; then
        echo "$OPS_ANNOTATIONS"
      else
        echo "ℹ️  No annotations on ops service"
      fi
      
      echo ""
      echo "Verifying custom annotations are applied..."
      echo "ℹ️  No custom pod annotations configured in values"
      
      echo ""
      echo "Validating annotation format..."
      ALL_ANNOTATIONS=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}')
      
      # Check if annotations are valid JSON
      if echo "$ALL_ANNOTATIONS" | grep -q "{"; then
        echo "✅ Annotations are in valid format"
      else
        echo "⚠️  WARNING: Could not parse annotations"
      fi
      
      echo ""
      echo "Checking for Helm-managed annotations..."
      HELM_ANNOTATIONS=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}' | grep -o "helm.sh[^,}]*" || echo "")
      
      if [ -n "$HELM_ANNOTATIONS" ]; then
        echo "Helm annotations found:"
        echo "$HELM_ANNOTATIONS"
      else
        echo "ℹ️  No Helm-specific annotations (normal for test pods)"
      fi
      
      echo ""
      echo "Verifying deployment annotations..."
      DEPLOYMENT_NAME="boundary-worker-deployment"
      DEPLOYMENT_ANNOTATIONS=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}')
      
      if [ -n "$DEPLOYMENT_ANNOTATIONS" ]; then
        echo "Deployment annotations:"
        echo "$DEPLOYMENT_ANNOTATIONS"
      else
        echo "ℹ️  No annotations on deployment"
      fi
      
      echo ""
      echo "Checking annotation count..."
      ANNOTATION_COUNT=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}' | grep -o '":' | wc -l)
      echo "Total pod annotations: $ANNOTATION_COUNT"
      
      if [ "$ANNOTATION_COUNT" -lt 1 ]; then
        echo "⚠️  WARNING: Very few annotations on pod"
      else
        echo "✅ Pod has annotations"
      fi
      
      echo ""
      echo "Listing all pod annotations..."
      kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations}' | \
        sed 's/,/\n/g' | sed 's/[{}"]//g' | head -20
      
      echo ""
      echo "=========================================="
      echo "✅ ANNOTATION CHECKS COMPLETED"
      echo "=========================================="
      echo "Annotation Summary:"
      echo "  Config Checksum: $([ -n "$CONFIG_CHECKSUM" ] && echo "Present" || echo "Missing")"
      echo "  Values Checksum: $([ -n "$VALUES_CHECKSUM" ] && echo "Present" || echo "Missing")"
      echo "  Total Annotations: $ANNOTATION_COUNT"
      echo "  Custom Annotations: None"
