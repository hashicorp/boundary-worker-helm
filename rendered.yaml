      else
        echo "⚠️  WARNING: Deployment instance label mismatch"
      fi
      
      echo ""
      echo "Validating no orphaned resources exist..."
      
      # Check for resources with the release name that might be orphaned
      echo "Searching for resources with release label..."
      ALL_RESOURCES=$(kubectl get all -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o name 2>/dev/null || echo "")
      
      if [ -n "$ALL_RESOURCES" ]; then
        echo "Resources found with release label:"
        echo "$ALL_RESOURCES"
        
        RESOURCE_COUNT=$(echo "$ALL_RESOURCES" | wc -l)
