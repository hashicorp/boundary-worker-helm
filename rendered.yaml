      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -e
      echo "=========================================="
      echo "Test: Worker Process Running"
      echo "=========================================="
      
      NAMESPACE="default"
      
      echo "Finding worker pod..."
      POD_NAME=$(kubectl get pods -n "$NAMESPACE" \
        -l app.kubernetes.io/component=worker,app.kubernetes.io/instance=boundary-worker \
        -o jsonpath='{.items[0].metadata.name}')
      
      if [ -z "$POD_NAME" ]; then
        echo "❌ FAILED: Worker pod not found"
        exit 1
      fi
      echo "✅ Worker pod found: $POD_NAME"
      
      echo ""
      echo "Checking if boundary server process is running..."
      PROCESS_CHECK=$(kubectl exec -n "$NAMESPACE" "$POD_NAME" -- ps aux 2>/dev/null | grep -v grep | grep "boundary server" || echo "")
      
      if [ -z "$PROCESS_CHECK" ]; then
        echo "❌ FAILED: boundary server process not found"
        echo "Running processes:"
        kubectl exec -n "$NAMESPACE" "$POD_NAME" -- ps aux 2>/dev/null || echo "Could not list processes"
        exit 1
      fi
      echo "✅ boundary server process is running"
      echo "Process details:"
      echo "$PROCESS_CHECK"
      
      echo ""
      echo "Extracting process information..."
      PID=$(echo "$PROCESS_CHECK" | awk '{print $2}' | head -1)
      echo "Process ID: $PID"
      
      echo ""
      echo "Checking if process is using correct config file..."
      if echo "$PROCESS_CHECK" | grep -q "/tmp/boundary-worker-processed.hcl"; then
        echo "✅ Process is using processed config file: /tmp/boundary-worker-processed.hcl"
      elif echo "$PROCESS_CHECK" | grep -q "config"; then
        CONFIG_FILE=$(echo "$PROCESS_CHECK" | grep -o '\-config=[^ ]*' | cut -d= -f2)
        echo "✅ Process is using config file: $CONFIG_FILE"
      else
        echo "⚠️  WARNING: Could not determine config file from process arguments"
      fi
      
      echo ""
      echo "Checking process state..."
      # Check if process is in running state (not zombie, defunct, etc.)
      PROCESS_STATE=$(echo "$PROCESS_CHECK" | awk '{print $8}' | head -1)
      if [ -n "$PROCESS_STATE" ]; then
        case "$PROCESS_STATE" in
          S|R|D)
            echo "✅ Process is in active state: $PROCESS_STATE"
            ;;
          Z)
            echo "❌ FAILED: Process is in zombie state"
            exit 1
            ;;
          T)
            echo "❌ FAILED: Process is stopped"
            exit 1
            ;;
          *)
            echo "⚠️  WARNING: Process state is: $PROCESS_STATE"
            ;;
        esac
      fi
      
      echo ""
      echo "Checking process uptime..."
      # Get process start time
      PROCESS_START=$(echo "$PROCESS_CHECK" | awk '{print $9}' | head -1)
      if [ -n "$PROCESS_START" ]; then
        echo "Process started at: $PROCESS_START"
      fi
      
      echo ""
      echo "Verifying process is not in error state..."
      # Check recent logs for critical errors
      RECENT_LOGS=$(kubectl logs -n "$NAMESPACE" "$POD_NAME" --tail=50 2>/dev/null || echo "")
      
      if echo "$RECENT_LOGS" | grep -qi "panic\|fatal error\|segmentation fault"; then
        echo "❌ FAILED: Critical errors found in recent logs"
        echo "Recent error logs:"
        echo "$RECENT_LOGS" | grep -i "panic\|fatal error\|segmentation fault" | tail -5
        exit 1
      fi
      echo "✅ No critical errors in recent logs"
      
      echo ""
      echo "Checking if worker is actively running (not stuck)..."
      # Check if there are recent log entries
      LAST_LOG_TIME=$(kubectl logs -n "$NAMESPACE" "$POD_NAME" --tail=1 --timestamps 2>/dev/null | awk '{print $1}' || echo "")
      if [ -n "$LAST_LOG_TIME" ]; then
        echo "Last log entry timestamp: $LAST_LOG_TIME"
        echo "✅ Worker is actively logging"
      else
        echo "⚠️  WARNING: Could not determine last log timestamp"
      fi
      
      echo ""
      echo "Checking process resource usage..."
      CPU_USAGE=$(echo "$PROCESS_CHECK" | awk '{print $3}' | head -1)
      MEM_USAGE=$(echo "$PROCESS_CHECK" | awk '{print $4}' | head -1)
      echo "CPU Usage: ${CPU_USAGE}%"
      echo "Memory Usage: ${MEM_USAGE}%"
      
      # Check if CPU usage is suspiciously high (>90%)
      CPU_INT=$(echo "$CPU_USAGE" | cut -d. -f1)
      if [ "$CPU_INT" -gt 90 ]; then
        echo "⚠️  WARNING: CPU usage is very high (${CPU_USAGE}%)"
      fi
      
      echo ""
      echo "=========================================="
      echo "✅ ALL PROCESS CHECKS PASSED"
      echo "=========================================="
      echo "Worker Process Summary:"
      echo "  PID: $PID"
      echo "  State: $PROCESS_STATE"
      echo "  CPU: ${CPU_USAGE}%"
      echo "  Memory: ${MEM_USAGE}%"
      echo "  Started: $PROCESS_START"
---
# Source: boundary-worker/templates/tests/test-worker-registration.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "boundary-worker-test-worker-registration"
  namespace: default
  labels:
    helm.sh/chart: boundary-worker-0.1.0
    app.kubernetes.io/name: boundary-worker
    app.kubernetes.io/instance: boundary-worker
    app.kubernetes.io/version: "0.20.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "boundary-worker-test"
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: test
    image: bitnami/kubectl:latest
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -e
      echo "=========================================="
      echo "Test: Worker Registration Status"
      echo "=========================================="
      
      NAMESPACE="default"
      
      echo "Finding worker pod..."
      POD_NAME=$(kubectl get pods -n "$NAMESPACE" \
        -l app.kubernetes.io/component=worker,app.kubernetes.io/instance=boundary-worker \
        -o jsonpath='{.items[0].metadata.name}')
      
      if [ -z "$POD_NAME" ]; then
        echo "❌ FAILED: Worker pod not found"
        exit 1
      fi
      echo "✅ Worker pod found: $POD_NAME"
      
      echo ""
      echo "Retrieving worker logs for registration analysis..."
      LOGS=$(kubectl logs -n "$NAMESPACE" "$POD_NAME" --tail=500 2>/dev/null || echo "")
      
      if [ -z "$LOGS" ]; then
        echo "❌ FAILED: Could not retrieve worker logs"
        exit 1
      fi
      
      echo ""
      echo "Checking for worker authentication success..."
      if echo "$LOGS" | grep -qi "worker.*authenticated\|authentication.*success\|successfully.*authenticated"; then
        echo "✅ Worker authentication success messages found"
        echo "$LOGS" | grep -i "worker.*authenticated\|authentication.*success" | tail -3
      else
        echo "⚠️  WARNING: No explicit authentication success messages found"
        echo "This may be normal depending on Boundary version and log level"
      fi
      
      echo ""
      echo "Checking for authentication errors..."
      AUTH_ERRORS=$(echo "$LOGS" | grep -i "auth.*error\|authentication.*fail\|failed.*authenticate" | grep -i "worker\|controller" | grep -v "test\|plugin\|storage" || echo "")
      
      if [ -n "$AUTH_ERRORS" ]; then
        echo "❌ FAILED: Worker authentication errors found:"
        echo "$AUTH_ERRORS"
        exit 1
      fi
      echo "✅ No worker authentication errors found"
      
      echo ""
      echo "Verifying worker ID is generated/assigned..."
      WORKER_ID=$(echo "$LOGS" | grep -i "worker.*id\|worker_id" | grep -v "test" | tail -5 || echo "")
      
      if [ -n "$WORKER_ID" ]; then
        echo "✅ Worker ID references found in logs:"
        echo "$WORKER_ID" | tail -3
      else
        echo "ℹ️  No explicit worker ID in logs (may be normal)"
      fi
      
      echo ""
      echo "Checking for controller connection establishment..."
      if echo "$LOGS" | grep -qi "connect.*controller\|controller.*connect\|established.*connection"; then
        echo "✅ Controller connection messages found"
        echo "$LOGS" | grep -i "connect.*controller\|controller.*connect\|established.*connection" | tail -3
      else
        echo "⚠️  WARNING: No explicit controller connection messages"
      fi
      
      echo ""
      echo "Looking for heartbeat messages..."
      HEARTBEAT=$(echo "$LOGS" | grep -i "heartbeat\|status.*report\|health.*check" | tail -5 || echo "")
      
      if [ -n "$HEARTBEAT" ]; then
        echo "✅ Heartbeat/status messages found:"
        echo "$HEARTBEAT" | tail -3
      else
        echo "ℹ️  No explicit heartbeat messages (may use different terminology)"
      fi
      
      echo ""
      echo "Checking for registration-related errors..."
      REG_ERRORS=$(echo "$LOGS" | grep -i "registration.*error\|failed.*register\|register.*fail" | grep -v "test" || echo "")
      
      if [ -n "$REG_ERRORS" ]; then
        echo "❌ FAILED: Registration errors found:"
        echo "$REG_ERRORS"
        exit 1
      fi
      echo "✅ No registration errors found"
      
      echo ""
      echo "Verifying worker is operational..."
      # Check for recent activity indicating worker is running
      RECENT_LOGS=$(echo "$LOGS" | tail -20)
      
      if echo "$RECENT_LOGS" | grep -qi "error\|fail\|panic"; then
        echo "⚠️  WARNING: Recent errors detected in logs:"
        echo "$RECENT_LOGS" | grep -i "error\|fail\|panic" | tail -5
      else
        echo "✅ No recent errors in worker logs"
      fi
      
      echo ""
      echo "Checking worker startup sequence..."
      if echo "$LOGS" | grep -qi "starting.*worker\|worker.*starting\|boundary.*server.*start"; then
        echo "✅ Worker startup sequence found in logs"
      else
        echo "⚠️  WARNING: No explicit startup sequence messages"
      fi
      
      echo ""
      echo "Analyzing log patterns for successful registration..."
      # Count different types of messages
      INFO_COUNT=$(echo "$LOGS" | grep -ci "info" || echo "0")
      ERROR_COUNT=$(echo "$LOGS" | grep -ci "error" || echo "0")
      WARN_COUNT=$(echo "$LOGS" | grep -ci "warn" || echo "0")
      
      echo "Log message distribution:"
      echo "  INFO messages: $INFO_COUNT"
      echo "  WARN messages: $WARN_COUNT"
      echo "  ERROR messages: $ERROR_COUNT"
      
      if [ "$ERROR_COUNT" -gt 10 ]; then
        echo "⚠️  WARNING: High number of error messages ($ERROR_COUNT)"
      fi
      
      echo ""
      echo "=========================================="
      echo "✅ WORKER REGISTRATION CHECKS COMPLETED"
      echo "=========================================="
      echo "Registration Status Summary:"
      echo "  Authentication: Checked"
      echo "  Worker ID: Verified"
      echo "  Controller Connection: Analyzed"
      echo "  Errors: None critical"
      echo ""
      echo "Note: Some checks may show warnings depending on:"
      echo "  - Boundary version and log format"
      echo "  - Controller availability"
      echo "  - Log verbosity level"
