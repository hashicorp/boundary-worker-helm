      echo "  app.kubernetes.io/instance: $APP_INSTANCE"
      echo "  app.kubernetes.io/component: $APP_COMPONENT"
      echo "  app.kubernetes.io/managed-by: $APP_MANAGED_BY"
      
      if [ -z "$APP_NAME" ]; then
        echo "❌ FAILED: app.kubernetes.io/name label missing"
        exit 1
      fi
      echo "✅ app.kubernetes.io/name label is set"
      
      if [ "$APP_INSTANCE" != "$RELEASE_NAME" ]; then
        echo "❌ FAILED: app.kubernetes.io/instance should be $RELEASE_NAME, got $APP_INSTANCE"
        exit 1
      fi
      echo "✅ app.kubernetes.io/instance matches release name"
      
      if [ "$APP_COMPONENT" != "worker" ]; then
