# Source: boundary-worker/templates/worker-deployment.yaml
# Boundary Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boundary-worker-deployment
  namespace: default
  labels:
    helm.sh/chart: boundary-worker-0.1.0
    app.kubernetes.io/name: boundary-worker
    app.kubernetes.io/instance: boundary-worker
    app.kubernetes.io/version: "0.20.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: worker
spec:
  replicas: 1  # Workers are not scaled horizontally
  selector:
    matchLabels:
      app.kubernetes.io/name: boundary-worker
      app.kubernetes.io/instance: boundary-worker
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        checksum/config: 5644fd654550405c74ba9608d8fbb11af5c9dfe5d46b9eb18afb59224e1a152f
        checksum/values: adb294b01f09d9e64a977a9608e6208e9affcd7933e766452d69754aa4fd6793
      labels:
        app.kubernetes.io/name: boundary-worker
        app.kubernetes.io/instance: boundary-worker
        app.kubernetes.io/component: worker
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90  # 2 hours grace period for graceful shutdown
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 100
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: "hashicorp/boundary-enterprise:0.21-ent"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 100
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SKIP_SETCAP
              value: "1"
          command:
            - /bin/sh
            - -c
            - |
              # Substitute environment variables and convert POD_NAME to lowercase
              export POD_NAME_LOWER=$(echo $POD_NAME | tr '[:upper:]' '[:lower:]')
              sed "s/\${POD_NAME_LOWER}/$POD_NAME_LOWER/g" /etc/boundary/boundary-worker.hcl > /tmp/boundary-worker-processed.hcl
              exec boundary server -config=/tmp/boundary-worker-processed.hcl
          ports:
            - name: proxy
              containerPort: 9202
              protocol: TCP
            - name: ops
              containerPort: 9203
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/boundary
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: auth-storage
              mountPath: /var/lib/boundary
            - name: recording-storage
              mountPath: /boundary/recording
      volumes:
        - name: config
          configMap:
            name: boundary-worker-config
        - name: tmp
          emptyDir: {}
        - name: auth-storage
          persistentVolumeClaim:
            claimName: boundary-worker-auth-storage
        - name: recording-storage
          persistentVolumeClaim:
            claimName: boundary-worker-recording-storage
