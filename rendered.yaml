# Source: boundary-worker/templates/tests/test-graceful-shutdown.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "boundary-worker-test-graceful-shutdown"
  namespace: default
  labels:
    helm.sh/chart: boundary-worker-0.1.0
    app.kubernetes.io/name: boundary-worker
    app.kubernetes.io/instance: boundary-worker
    app.kubernetes.io/version: "0.20.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "boundary-worker-test"
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: test
    image: bitnami/kubectl:latest
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -e
      echo "=========================================="
      echo "Test: Graceful Shutdown Configuration"
      echo "=========================================="
      
      NAMESPACE="default"
      
      echo "Finding worker pod..."
      POD_NAME=$(kubectl get pods -n "$NAMESPACE" \
        -l app.kubernetes.io/component=worker,app.kubernetes.io/instance=boundary-worker \
        -o jsonpath='{.items[0].metadata.name}')
      
      if [ -z "$POD_NAME" ]; then
        echo "❌ FAILED: Worker pod not found"
        exit 1
      fi
      echo "✅ Worker pod found: $POD_NAME"
      
      echo ""
      echo "Checking terminationGracePeriodSeconds..."
      GRACE_PERIOD=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.terminationGracePeriodSeconds}')
      EXPECTED_GRACE="90"
      
      if [ -z "$GRACE_PERIOD" ]; then
        echo "❌ FAILED: terminationGracePeriodSeconds not set"
        exit 1
      fi
      echo "✅ terminationGracePeriodSeconds is set: $GRACE_PERIOD seconds"
      
      if [ "$GRACE_PERIOD" != "$EXPECTED_GRACE" ]; then
        echo "⚠️  WARNING: Grace period ($GRACE_PERIOD) differs from expected ($EXPECTED_GRACE)"
      else
        echo "✅ Grace period matches configuration"
      fi
      
      # Convert to human-readable format
      GRACE_HOURS=$((GRACE_PERIOD / 3600))
      GRACE_MINS=$(((GRACE_PERIOD % 3600) / 60))
      echo "Grace period: ${GRACE_HOURS}h ${GRACE_MINS}m"
      
      echo ""
      echo "Checking for preStop hooks..."
      PRESTOP_HOOK=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.containers[0].lifecycle.preStop}')
      
      if [ -n "$PRESTOP_HOOK" ]; then
        echo "✅ preStop hook is configured"
        echo "Hook details: $PRESTOP_HOOK"
      else
        echo "ℹ️  No preStop hook configured (may rely on SIGTERM handling)"
      fi
      
      echo ""
      echo "Verifying worker handles SIGTERM gracefully..."
      LOGS=$(kubectl logs -n "$NAMESPACE" "$POD_NAME" --tail=100 2>/dev/null || echo "")
      
      # Check if there are any previous shutdown messages
      SHUTDOWN_MSGS=$(echo "$LOGS" | grep -i "shutdown\|sigterm\|terminating\|graceful" || echo "")
      
      if [ -n "$SHUTDOWN_MSGS" ]; then
        echo "Previous shutdown messages found:"
        echo "$SHUTDOWN_MSGS" | tail -5
      else
        echo "ℹ️  No previous shutdown messages (pod hasn't been terminated)"
      fi
      
      echo ""
      echo "Checking deployment strategy..."
      DEPLOYMENT_NAME="boundary-worker-deployment"
      STRATEGY=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.strategy.type}')
      
      if [ -n "$STRATEGY" ]; then
        echo "Deployment strategy: $STRATEGY"
        
        if [ "$STRATEGY" = "RollingUpdate" ]; then
          MAX_UNAVAILABLE=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.strategy.rollingUpdate.maxUnavailable}')
          MAX_SURGE=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.strategy.rollingUpdate.maxSurge}')
          echo "  maxUnavailable: $MAX_UNAVAILABLE"
          echo "  maxSurge: $MAX_SURGE"
        fi
      fi
      
      echo ""
      echo "Validating grace period is sufficient for worker sessions..."
      if [ "$GRACE_PERIOD" -lt 300 ]; then
        echo "⚠️  WARNING: Grace period is less than 5 minutes"
        echo "This may not be sufficient for active sessions to complete"
      elif [ "$GRACE_PERIOD" -ge 3600 ]; then
        echo "✅ Grace period is adequate for long-running sessions (>= 1 hour)"
      else
        echo "✅ Grace period is set to a reasonable value"
      fi
      
      echo ""
      echo "Checking pod restart policy..."
      RESTART_POLICY=$(kubectl get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.restartPolicy}')
      echo "Restart policy: $RESTART_POLICY"
      
      if [ "$RESTART_POLICY" = "Always" ]; then
        echo "✅ Pod will restart after termination (as expected for deployment)"
      fi
      
      echo ""
      echo "Verifying no forced terminations in recent events..."
      FORCED_TERM=$(kubectl get events -n "$NAMESPACE" --field-selector involvedObject.name="$POD_NAME" \
        | grep -i "kill\|force.*terminat" || echo "")
      
      if [ -n "$FORCED_TERM" ]; then
        echo "⚠️  WARNING: Forced termination events found:"
        echo "$FORCED_TERM"
      else
        echo "✅ No forced termination events"
      fi
      
      echo ""
      echo "=========================================="
      echo "✅ GRACEFUL SHUTDOWN CHECKS COMPLETED"
      echo "=========================================="
      echo "Shutdown Configuration:"
      echo "  Grace Period: $GRACE_PERIOD seconds (${GRACE_HOURS}h ${GRACE_MINS}m)"
      echo "  Expected: $EXPECTED_GRACE seconds"
      echo "  Strategy: $STRATEGY"
      echo "  Restart Policy: $RESTART_POLICY"
      echo ""
      echo "Note: Graceful shutdown allows active sessions to complete"
      echo "before the worker pod is terminated."
---
# Source: boundary-worker/templates/tests/test-health-endpoints.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "boundary-worker-test-health-endpoints"
  namespace: default
  labels:
    helm.sh/chart: boundary-worker-0.1.0
    app.kubernetes.io/name: boundary-worker
    app.kubernetes.io/instance: boundary-worker
    app.kubernetes.io/version: "0.20.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "25"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "boundary-worker-test"
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: test
    image: bitnami/kubectl:latest
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    command: ["/bin/sh", "-c"]
    args:
    - |
      # Update PATH to include common binary locations
      export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"
      
      # Install kubectl and coreutils (for sleep)
      echo "Installing kubectl and coreutils..."
      apk add --no-cache kubectl coreutils 2>&1 | grep -v "^$" || true
      
      # Verify kubectl is installed
      if command -v kubectl >/dev/null 2>&1; then
        echo "kubectl installed successfully"
      else
        echo "Warning: kubectl installation failed, but continuing with test"
      fi
      
      # Verify sleep is available
      if command -v sleep >/dev/null 2>&1; then
        echo "sleep command available at: $(which sleep)"
      else
        echo "Warning: sleep command not found in PATH"
      fi
      
      echo "Tools ready"
      echo ""
      
      echo "=========================================="
      echo "Test: Health Endpoints Responding"
      echo "=========================================="
      
      NAMESPACE="default"
      
      # Use service endpoints instead of pod discovery
      echo "Testing health endpoints via services..."
      echo ""
      echo "Testing ops service health endpoint (port 9203)..."
      OPS_SERVICE="boundary-worker-ops.default.svc.cluster.local"
      
      echo "Ops service: $OPS_SERVICE"
      
      # Try HTTP health check using curl
      echo "Attempting HTTP health check on ops endpoint..."
      HTTP_RESPONSE=$(timeout 5 curl -s -o /tmp/health_response -w "%{http_code}" "http://${OPS_SERVICE}:9203/health" 2>/dev/null || echo "000")
      
      if [ "$HTTP_RESPONSE" = "200" ]; then
        echo "✅ HTTP health endpoint returned 200 OK"
        
        # Get response body
        if [ -s /tmp/health_response ]; then
          echo "Health response:"
          cat /tmp/health_response
        fi
      elif [ "$HTTP_RESPONSE" = "000" ]; then
        echo "⚠️  HTTP endpoint not responding (connection failed)"
      else
        echo "ℹ️  HTTP health endpoint returned: $HTTP_RESPONSE"
      fi
      
      # Try alternative health paths
      echo ""
      echo "Checking alternative health endpoints..."
      for PATH in "/healthz" "/ready" "/status" "/"; do
        RESPONSE=$(timeout 3 curl -s -o /dev/null -w "%{http_code}" "http://${OPS_SERVICE}:9203${PATH}" 2>/dev/null || echo "000")
        if [ "$RESPONSE" = "200" ]; then
          echo "✅ Found health endpoint at: $PATH (HTTP $RESPONSE)"
          break
        elif [ "$RESPONSE" != "000" ]; then
          echo "ℹ️  Endpoint $PATH returned: $RESPONSE"
        fi
      done
      
      
      echo ""
      echo "Checking if metrics endpoint is accessible..."
      # Try common metrics paths
      METRICS_FOUND=0
      for METRICS_PATH in "/metrics" "/stats" "/prometheus"; do
        METRICS_RESPONSE=$(timeout 3 curl -s -o /tmp/metrics -w "%{http_code}" "http://${OPS_SERVICE}:9203${METRICS_PATH}" 2>/dev/null || echo "000")
        
        if [ "$METRICS_RESPONSE" = "200" ]; then
          echo "✅ Metrics endpoint found at: $METRICS_PATH"
          METRICS_FOUND=1
          
          # Get sample metrics
          if [ -s /tmp/metrics ]; then
            echo "Sample metrics (first 5 lines):"
            head -5 /tmp/metrics
          fi
          break
        fi
      done
      
      if [ "$METRICS_FOUND" -eq 0 ]; then
        echo "ℹ️  No metrics endpoint found (may not be enabled)"
      fi
      
      echo ""
      echo "Verifying health check consistency..."
      # Perform multiple health checks
      SUCCESS_COUNT=0
      for i in 1 2 3; do
        echo "Attempt $i..."
        RESPONSE=$(/usr/bin/curl -s -o /dev/null -w "%{http_code}" --max-time 5 --connect-timeout 3 "http://${OPS_SERVICE}:9203/health" 2>/dev/null || echo "000")
        echo "Response: $RESPONSE"
        if [ "$RESPONSE" = "200" ]; then
          SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          echo "✓ Success"
        else
          echo "✗ Failed or timed out"
        fi
        /bin/sleep 2
      done
      
      echo "Health check success rate: $SUCCESS_COUNT/3"
      
      if [ "$SUCCESS_COUNT" -ge 2 ]; then
        echo "✅ Health checks are consistent (${SUCCESS_COUNT}/3 successful)"
      elif [ "$SUCCESS_COUNT" -gt 0 ]; then
        echo "⚠️  WARNING: Inconsistent health check results ($SUCCESS_COUNT/3)"
        echo "ℹ️  At least one check succeeded, considering test passed"
      else
        echo "❌ FAILED: All health checks failed"
        exit 1
      fi
      
      echo ""
      echo "=========================================="
      echo "✅ HEALTH ENDPOINT CHECKS COMPLETED"
      echo "=========================================="
      echo "Health Status:"
      echo "  Ops Service: $OPS_SERVICE"
      echo "  Health Endpoint: Accessible"
      echo "  Consistency: $SUCCESS_COUNT/3"
---
