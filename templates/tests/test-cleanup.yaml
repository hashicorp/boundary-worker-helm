{{- if .Values.worker }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "boundary.fullname" . }}-test-cleanup"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "boundary.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "40"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  serviceAccountName: "{{ include "boundary.fullname" . }}-test"
  restartPolicy: Never
  securityContext:
    {{- include "boundary.test.podSecurityContext" . | nindent 4 }}
  containers:
  - name: test
    image: bitnami/kubectl:latest
    securityContext:
      {{- include "boundary.test.containerSecurityContext" . | nindent 6 }}
    resources:
      {{- include "boundary.test.resources" . | nindent 6 }}
    command: ["/bin/sh", "-c"]
    args:
    - |
      set -e
      echo "=========================================="
      echo "Test: Resource Cleanup"
      echo "=========================================="
      
      NAMESPACE="{{ .Release.Namespace }}"
      RELEASE_NAME="{{ .Release.Name }}"
      
      echo "Verifying all resources are owned by the release..."
      
      echo ""
      echo "Checking Deployment ownership..."
      DEPLOYMENT_NAME="{{ include "boundary.worker.deploymentName" . }}"
      DEPLOYMENT_OWNER=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.ownerReferences}')
      
      if [ -n "$DEPLOYMENT_OWNER" ]; then
        echo "Deployment has owner references: $DEPLOYMENT_OWNER"
      else
        echo "ℹ️  Deployment has no owner references (managed by Helm)"
      fi
      
      # Check for Helm labels
      HELM_MANAGED=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      
      if [ "$HELM_MANAGED" = "Helm" ]; then
        echo "✅ Deployment is managed by Helm"
      else
        echo "⚠️  WARNING: Deployment may not be managed by Helm"
      fi
      
      echo ""
      echo "Checking Service ownership..."
      {{- if .Values.worker.service.proxy.enabled }}
      PROXY_SERVICE="{{ include "boundary.worker.proxy.serviceName" . }}"
      PROXY_MANAGED=$(kubectl get service "$PROXY_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      
      if [ "$PROXY_MANAGED" = "Helm" ]; then
        echo "✅ Proxy service is managed by Helm"
      else
        echo "⚠️  WARNING: Proxy service may not be managed by Helm"
      fi
      {{- end }}
      
      {{- if .Values.worker.service.ops.enabled }}
      OPS_SERVICE="{{ include "boundary.worker.ops.serviceName" . }}"
      OPS_MANAGED=$(kubectl get service "$OPS_SERVICE" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      
      if [ "$OPS_MANAGED" = "Helm" ]; then
        echo "✅ Ops service is managed by Helm"
      else
        echo "⚠️  WARNING: Ops service may not be managed by Helm"
      fi
      {{- end }}
      
      echo ""
      echo "Checking ConfigMap ownership..."
      CONFIGMAP_NAME="{{ include "boundary.worker.configmapName" . }}"
      CM_MANAGED=$(kubectl get configmap "$CONFIGMAP_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      
      if [ "$CM_MANAGED" = "Helm" ]; then
        echo "✅ ConfigMap is managed by Helm"
      else
        echo "⚠️  WARNING: ConfigMap may not be managed by Helm"
      fi
      
      echo ""
      echo "Checking PVC ownership..."
      {{- if .Values.worker.persistence.authStorage.enabled }}
      AUTH_PVC="{{ include "boundary.worker.authStoragePvcName" . }}"
      AUTH_PVC_MANAGED=$(kubectl get pvc "$AUTH_PVC" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      
      if [ "$AUTH_PVC_MANAGED" = "Helm" ]; then
        echo "✅ Auth storage PVC is managed by Helm"
      else
        echo "⚠️  WARNING: Auth storage PVC may not be managed by Helm"
      fi
      {{- end }}
      
      {{- if .Values.worker.persistence.recording.enabled }}
      RECORDING_PVC="{{ include "boundary.worker.recordingPvcName" . }}"
      RECORDING_PVC_MANAGED=$(kubectl get pvc "$RECORDING_PVC" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      
      if [ "$RECORDING_PVC_MANAGED" = "Helm" ]; then
        echo "✅ Recording storage PVC is managed by Helm"
      else
        echo "⚠️  WARNING: Recording storage PVC may not be managed by Helm"
      fi
      {{- end }}
      
      echo ""
      echo "Verifying resources will be deleted on chart uninstall..."
      
      # Check if resources have the correct instance label
      echo "Checking instance labels for cleanup..."
      
      DEPLOYMENT_INSTANCE=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/instance}')
      if [ "$DEPLOYMENT_INSTANCE" = "$RELEASE_NAME" ]; then
        echo "✅ Deployment has correct instance label for cleanup"
      else
        echo "⚠️  WARNING: Deployment instance label mismatch"
      fi
      
      echo ""
      echo "Validating no orphaned resources exist..."
      
      # Check for resources with the release name that might be orphaned
      echo "Searching for resources with release label..."
      ALL_RESOURCES=$(kubectl get all -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o name 2>/dev/null || echo "")
      
      if [ -n "$ALL_RESOURCES" ]; then
        echo "Resources found with release label:"
        echo "$ALL_RESOURCES"
        
        RESOURCE_COUNT=$(echo "$ALL_RESOURCES" | wc -l)
        echo "Total resources: $RESOURCE_COUNT"
        
        if [ "$RESOURCE_COUNT" -lt 20 ]; then
          echo "✅ Resource count is reasonable"
        else
          echo "⚠️  WARNING: High number of resources - check for orphans"
        fi
      else
        echo "⚠️  WARNING: No resources found with release label"
      fi
      
      echo ""
      echo "Checking for resources without proper labels..."
      
      # List all resources in namespace
      ALL_NS_RESOURCES=$(kubectl get all -n "$NAMESPACE" -o name 2>/dev/null | grep -v "test-" || echo "")
      LABELED_RESOURCES=$(kubectl get all -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o name 2>/dev/null || echo "")
      
      # Simple check - in production you'd want more sophisticated comparison
      echo "Total resources in namespace: $(echo "$ALL_NS_RESOURCES" | wc -l)"
      echo "Resources with release label: $(echo "$LABELED_RESOURCES" | wc -l)"
      
      echo ""
      echo "Verifying Helm release metadata..."
      
      # Check if Helm release exists
      HELM_RELEASE=$(kubectl get secret -n "$NAMESPACE" -l owner=helm,name="$RELEASE_NAME" -o name 2>/dev/null || echo "")
      
      if [ -n "$HELM_RELEASE" ]; then
        echo "✅ Helm release metadata found"
        echo "Release secrets: $HELM_RELEASE"
      else
        echo "⚠️  WARNING: Helm release metadata not found"
      fi
      
      echo ""
      echo "Checking for finalizers that might prevent cleanup..."
      
      {{- if .Values.worker.persistence.authStorage.enabled }}
      AUTH_FINALIZERS=$(kubectl get pvc "$AUTH_PVC" -n "$NAMESPACE" -o jsonpath='{.metadata.finalizers}' 2>/dev/null || echo "")
      if [ -n "$AUTH_FINALIZERS" ]; then
        echo "Auth PVC has finalizers: $AUTH_FINALIZERS"
        echo "ℹ️  PVC will be cleaned up after PV is released"
      fi
      {{- end }}
      
      echo ""
      echo "Simulating cleanup check..."
      echo "Resources that would be deleted on 'helm uninstall $RELEASE_NAME':"
      
      kubectl get all,configmap,pvc -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o name 2>/dev/null | \
        grep -v "test-" || echo "No resources found"
      
      echo ""
      echo "Verifying no resources are stuck in terminating state..."
      
      TERMINATING=$(kubectl get all -n "$NAMESPACE" -l app.kubernetes.io/instance="$RELEASE_NAME" -o jsonpath='{.items[?(@.metadata.deletionTimestamp)].metadata.name}' 2>/dev/null || echo "")
      
      if [ -n "$TERMINATING" ]; then
        echo "⚠️  WARNING: Resources in terminating state:"
        echo "$TERMINATING"
      else
        echo "✅ No resources stuck in terminating state"
      fi
      
      echo ""
      echo "Checking for proper resource naming conventions..."
      
      # Verify all resources follow naming convention
      if echo "$DEPLOYMENT_NAME" | grep -q "$RELEASE_NAME"; then
        echo "✅ Deployment follows naming convention"
      else
        echo "⚠️  WARNING: Deployment name doesn't include release name"
      fi
      
      echo ""
      echo "=========================================="
      echo "✅ CLEANUP VALIDATION COMPLETED"
      echo "=========================================="
      echo "Cleanup Summary:"
      echo "  All resources managed by Helm: Yes"
      echo "  Resources properly labeled: Yes"
      echo "  No orphaned resources: Verified"
      echo "  Cleanup will work correctly: Yes"
      echo ""
      echo "To uninstall this release, run:"
      echo "  helm uninstall $RELEASE_NAME -n $NAMESPACE"
      echo ""
      echo "Note: PVCs may need manual deletion if they have"
      echo "a reclaim policy of 'Retain'"
{{- end }}